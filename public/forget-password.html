<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM AVIATOR | စကားဝှက်မေ့နေပါသလား?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="premium-card">
            <!-- Premium Header -->
            <div class="premium-header">
                <h1>✈️ AVIATOR ✈️</h1>
                <h2>စကားဝှက်မေ့နေပါသလား?</h2>
                <div class="tagline">RESET PASSWORD</div>
            </div>

            <!-- Forget Password Form -->
            <form class="premium-form" id="forgetForm">
                <div class="form-group">
                    <label><i>📧</i> မှတ်ပုံတင်ထားသော အီးမေးလ်</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="example@gmail.com" required>
                    </div>
                    <small style="color: rgba(255,255,255,0.5); display: block; margin-top: 8px;">
                        သင်၏ Gmail ကို ထည့်သွင်းပါ။ အတည်ပြုပြီးပါက စကားဝှက်အသစ် ပြောင်းလဲနိုင်ပါသည်။
                    </small>
                </div>

                <!-- Message Container -->
                <div id="messageContainer" class="message-container" style="display: none;"></div>

                <button type="submit" class="btn-neon" id="submitBtn">
                    <span>ဆက်လုပ်ရန်</span>
                </button>
            </form>

            <!-- Links -->
            <div class="auth-links">
                <a href="login.html">အကောင့်ဝင်ရန် ပြန်သွားမည်</a>
                <span>•</span>
                <a href="signup.html">အကောင့်သစ်ဖွင့်ရန်</a>
            </div>

            <!-- Footer -->
            <div class="premium-footer">
                <p>© 2024 PREMIUM AVIATOR • မြန်မာ့ဂိမ်း</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const messageContainer = document.getElementById('messageContainer');
            const submitBtn = document.getElementById('submitBtn');
            
            // Show loading
            submitBtn.innerHTML = '<span class="spinner"></span> စစ်ဆေးနေသည်...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/forget-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageContainer.style.display = 'block';
                    messageContainer.className = 'message-container success';
                    messageContainer.textContent = '✅ ' + data.message;
                    
                    // Redirect to reset password page
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1500);
                } else {
                    messageContainer.style.display = 'block';
                    messageContainer.className = 'message-container error';
                    messageContainer.textContent = '❌ ' + data.message;
                    
                    submitBtn.innerHTML = 'ဆက်လုပ်ရန်';
                    submitBtn.disabled = false;
                }
            } catch (error) {
                messageContainer.style.display = 'block';
                messageContainer.className = 'message-container error';
                messageContainer.textContent = '❌ ဆာဗာနှင့် ချိတ်ဆက်မှု အဆင်မပြေပါ။';
                
                submitBtn.innerHTML = 'ဆက်လုပ်ရန်';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
