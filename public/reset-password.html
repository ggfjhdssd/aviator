<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM AVIATOR | စကားဝှက်အသစ်ပြောင်းရန်</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="premium-card">
            <!-- Premium Header -->
            <div class="premium-header">
                <h1>✈️ AVIATOR ✈️</h1>
                <h2>စကားဝှက်အသစ်ပြောင်းရန်</h2>
                <div class="tagline">NEW PASSWORD</div>
            </div>

            <!-- Reset Password Form -->
            <form class="premium-form" id="resetForm">
                <div class="form-group">
                    <label><i>🔐</i> စကားဝှက်အသစ်</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="password" id="newPassword" placeholder="စကားဝှက်အသစ်ထည့်ပါ" required>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i>✓</i> စကားဝှက်အသစ် အတည်ပြုရန်</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✓</span>
                        <input type="password" id="confirmPassword" placeholder="စကားဝှက်ပြန်ထည့်ပါ" required>
                    </div>
                </div>

                <!-- Message Container -->
                <div id="messageContainer" class="message-container" style="display: none;"></div>

                <button type="submit" class="btn-neon" id="resetBtn">
                    <span>စကားဝှက်ပြောင်းရန်</span>
                </button>
            </form>

            <!-- Links -->
            <div class="auth-links">
                <a href="login.html">အကောင့်ဝင်ရန် ပြန်သွားမည်</a>
            </div>

            <!-- Footer -->
            <div class="premium-footer">
                <p>© 2024 PREMIUM AVIATOR • မြန်မာ့ဂိမ်း</p>
            </div>
        </div>
    </div>

    <script>
        // Password strength indicator
        document.getElementById('newPassword').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('strengthBar');
            let strength = 0;
            
            if (password.length >= 6) strength += 20;
            if (password.length >= 8) strength += 15;
            if (password.match(/[a-z]+/)) strength += 15;
            if (password.match(/[A-Z]+/)) strength += 15;
            if (password.match(/[0-9]+/)) strength += 15;
            if (password.match(/[$@#&!]+/)) strength += 20;
            
            strength = Math.min(strength, 100);
            strengthBar.style.width = strength + '%';
            
            if (strength < 30) {
                strengthBar.style.background = 'linear-gradient(90deg, #ff4444, #ff8844)';
            } else if (strength < 60) {
                strengthBar.style.background = 'linear-gradient(90deg, #ff8844, #ffff44)';
            } else if (strength < 80) {
                strengthBar.style.background = 'linear-gradient(90deg, #ffff44, #44ff44)';
            } else {
                strengthBar.style.background = 'linear-gradient(90deg, #44ff44, #00ffff)';
            }
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageContainer = document.getElementById('messageContainer');
            const resetBtn = document.getElementById('resetBtn');
            
            // Show loading
            resetBtn.innerHTML = '<span class="spinner"></span> စကားဝှက်ပြောင်းနေသည်...';
            resetBtn.disabled = true;
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ newPassword, confirmPassword }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageContainer.style.display = 'block';
                    messageContainer.className = 'message-container success';
                    messageContainer.textContent = '✅ ' + data.message;
                    
                    // Redirect to login page
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 2000);
                } else {
                    messageContainer.style.display = 'block';
                    messageContainer.className = 'message-container error';
                    messageContainer.textContent = '❌ ' + data.message;
                    
                    resetBtn.innerHTML = 'စကားဝှက်ပြောင်းရန်';
                    resetBtn.disabled = false;
                }
            } catch (error) {
                messageContainer.style.display = 'block';
                messageContainer.className = 'message-container error';
                messageContainer.textContent = '❌ ဆာဗာနှင့် ချိတ်ဆက်မှု အဆင်မပြေပါ။';
                
                resetBtn.innerHTML = 'စကားဝှက်ပြောင်းရန်';
                resetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
