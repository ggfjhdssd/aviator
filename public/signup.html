<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM AVIATOR | အကောင့်သစ်ဖွင့်ရန်</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="premium-card">
            <!-- Premium Header -->
            <div class="premium-header">
                <h1>✈️ AVIATOR ✈️</h1>
                <h2>ဂိမ်းဆော့ရင်း ပိုက်ဆံရှာ</h2>
                <div class="tagline">JOIN PREMIUM</div>
            </div>

            <!-- Signup Form -->
            <form class="premium-form" id="signupForm">
                <div class="form-group">
                    <label><i>👤</i> အသုံးပြုသူအမည်</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="အသုံးပြုသူအမည် (အနည်းဆုံး ၃လုံး)" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i>📧</i> အီးမေးလ် (Gmail)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="example@gmail.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><i>🔐</i> စကားဝှက် (အနည်းဆုံး ၆လုံး)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="password" id="password" placeholder="စကားဝှက်ထည့်ပါ" required>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label><i>✓</i> စကားဝှက် အတည်ပြုရန်</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✓</span>
                        <input type="password" id="confirmPassword" placeholder="စကားဝှက်ပြန်ထည့်ပါ" required>
                    </div>
                </div>

                <!-- Message Container -->
                <div id="messageContainer" class="message-container" style="display: none;"></div>

                <button type="submit" class="btn-neon" id="signupBtn">
                    <span>အကောင့်သစ်ဖွင့်ရန်</span>
                </button>
            </form>

            <!-- Links -->
            <div class="auth-links">
                <a href="login.html">အကောင့်ရှိပြီးသားလား? ဝင်ရောက်ရန်</a>
            </div>

            <!-- Footer -->
            <div class="premium-footer">
                <p>© 2024 PREMIUM AVIATOR • မြန်မာ့ဂိမ်း</p>
            </div>
        </div>
    </div>

    <script>
        // Password strength indicator
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('strengthBar');
            let strength = 0;
            
            // Length check
            if (password.length >= 6) strength += 20;
            if (password.length >= 8) strength += 15;
            
            // Character variety
            if (password.match(/[a-z]+/)) strength += 15;
            if (password.match(/[A-Z]+/)) strength += 15;
            if (password.match(/[0-9]+/)) strength += 15;
            if (password.match(/[$@#&!]+/)) strength += 20;
            
            // Cap at 100
            strength = Math.min(strength, 100);
            
            strengthBar.style.width = strength + '%';
            
            // Color based on strength
            if (strength < 30) {
                strengthBar.style.background = 'linear-gradient(90deg, #ff4444, #ff8844)';
            } else if (strength < 60) {
                strengthBar.style.background = 'linear-gradient(90deg, #ff8844, #ffff44)';
            } else if (strength < 80) {
                strengthBar.style.background = 'linear-gradient(90deg, #ffff44, #44ff44)';
            } else {
                strengthBar.style.background = 'linear-gradient(90deg, #44ff44, #00ffff)';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageContainer = document.getElementById('messageContainer');
            const signupBtn = document.getElementById('signupBtn');
            
            // Show loading
            signupBtn.innerHTML = '<span class="spinner"></span> အကောင့်ဖွင့်နေသည်...';
            signupBtn.disabled = true;
            
            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password, confirmPassword }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageContainer.style.display = 'block';
                    messageContainer.className = 'message-container success';
                    messageContainer.textContent = '✅ ' + data.message;
                    
                    // Redirect to game page
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1500);
                } else {
                    messageContainer.style.display = 'block';
                    messageContainer.className = 'message-container error';
                    messageContainer.textContent = '❌ ' + data.message;
                    
                    signupBtn.innerHTML = 'အကောင့်သစ်ဖွင့်ရန်';
                    signupBtn.disabled = false;
                }
            } catch (error) {
                messageContainer.style.display = 'block';
                messageContainer.className = 'message-container error';
                messageContainer.textContent = '❌ ဆာဗာနှင့် ချိတ်ဆက်မှု အဆင်မပြေပါ။';
                
                signupBtn.innerHTML = 'အကောင့်သစ်ဖွင့်ရန်';
                signupBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
