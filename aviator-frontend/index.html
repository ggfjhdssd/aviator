<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Crash Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>✈️ AVIATOR CRASH GAME</h1>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">ပွဲစဉ်:</span>
                <span class="status-value" id="gameId">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">အခြေအနေ:</span>
                <span class="status-value" id="gameStatus">စောင့်ဆိုင်းနေသည်...</span>
            </div>
            <div class="status-item">
                <span class="status-label">လက်ကျန်ငွေ:</span>
                <span class="status-value" id="balance">1000</span>
            </div>
        </div>

        <!-- Game Canvas -->
        <div class="canvas-container">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            
            <!-- Multiplier Display -->
            <div class="multiplier-display" id="multiplierDisplay">1.00x</div>
            
            <!-- Waiting Display -->
            <div class="waiting-display" id="waitingDisplay">
                နောက်ပွဲစရန် <span id="waitingTime">5</span> စက္ကန့်
            </div>
            
            <!-- Crash Display -->
            <div class="crash-display" id="crashDisplay">
                💥 CRASHED! 💥
            </div>
        </div>

        <!-- Betting Controls -->
        <div class="controls">
            <div class="input-group">
                <label for="userId">အသုံးပြုသူ ID</label>
                <input type="text" id="userId" placeholder="user123" value="user123">
            </div>
            <div class="input-group">
                <label for="betAmount">လောင်းကြေး</label>
                <input type="number" id="betAmount" min="10" max="10000" value="100">
            </div>
            <div class="button-group">
                <button id="placeBetBtn" class="btn bet-btn">လောင်းကြေးထိုးမည်</button>
                <button id="cashoutBtn" class="btn cashout-btn" disabled>ငွေထုတ်မည်</button>
            </div>
        </div>

        <!-- History -->
        <div class="history-section">
            <h3>မှတ်တမ်း</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <!-- Socket.io -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
